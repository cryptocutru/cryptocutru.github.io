<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVision — Курсы криптовалют онлайн в реальном времени</title>
    <meta name="description" content="Курсы криптовалют онлайн: Bitcoin, Ethereum, Solana, Ripple и другие. Данные с Binance в реальном времени, графики, стакан заявок, новости CoinTelegraph.">
    <meta name="keywords" content="курс криптовалют онлайн, криптовалюта, биткоин, ethereum, binance, цена криптовалют, крипторынок, crypto live">
    <link rel="canonical" href="https://cryptocutru.github.io/">
    <meta property="og:title" content="CryptoVision — Курсы криптовалют онлайн в реальном времени">
    <meta property="og:description" content="Курсы криптовалют онлайн: Bitcoin, Ethereum, Solana, Ripple и другие. Данные с Binance в реальном времени, графики, стакан заявок, новости CoinTelegraph.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cryptocutru.github.io/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ================================================== RESET ================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ================================================== THEME ================================================== */
        :root {
            --bg: #0b0b0b;
            --card: #151515;
            --border: #262626;
            --text: #ffffff;
            --gray: #909090;
            --orange: #ff8c00;
            --orange2: #ff5e00;
            --green: #00d26a;
            --red: #ff4747;
        }

        body.light {
            --bg: #f5f5f5;
            --card: #ffffff;
            --border: #dddddd;
            --text: #111111;
            --gray: #666666;
        }

        body {
            background: radial-gradient(circle at top right, rgba(255, 140, 0, .12), transparent 30%), radial-gradient(circle at bottom left, rgba(255, 100, 0, .08), transparent 30%), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: .25s;
        }

        /* ================================================== TICKER ================================================== */
        .ticker-wrapper {
            width: 100%;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 140, 0, .08);
            padding: 12px 0;
        }

        .ticker {
            display: flex;
            gap: 45px;
            width: max-content;
            animation: tickerMove 36s linear infinite;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        @keyframes tickerMove {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }

        /* ================================================== LAYOUT ================================================== */
        .container {
            width: 95%;
            max-width: 1700px;
            margin: auto;
            padding: 30px 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 44px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--orange), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .live-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 14px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
            100% {
                opacity: 1
            }
        }

        .theme-btn {
            border: none;
            background: linear-gradient(90deg, var(--orange), var(--orange2));
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
        }

        /* ================================================== TOP GRID ================================================== */
        .top-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 22px;
            align-items: start;
        }

        /* Убираем медиа-запрос, который переносил order book под main coins */
        /* @media(max-width:1200px){
            .top-grid{
                grid-template-columns:1fr;
            }
        } */

        /* ================================================== SECTION ================================================== */
        .section-title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--orange), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================================================== CRYPTO GRID ================================================== */
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ================================================== CARD ================================================== */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: .25s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 140, 0, .45);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--orange), transparent);
        }

        .coin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-info img {
            width: 42px;
            height: 42px;
        }

        .coin-name {
            font-size: 22px;
            font-weight: 700;
        }

        .coin-symbol {
            color: var(--gray);
            font-size: 14px;
        }

        .price {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .binance-price {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 14px;
        }

        .binance-price span {
            color: var(--orange);
            font-weight: 700;
        }

        .change {
            font-weight: 700;
            margin-bottom: 15px;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .chart-wrap {
            height: 130px;
            margin-top: 10px;
        }

        .history-box {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .history-item {
            flex: 1;
            min-width: 90px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 14px;
            padding: 12px;
        }

        .history-label {
            color: var(--gray);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .history-value {
            font-weight: 700;
        }

        /* ================================================== ORDER BOOK PANEL ================================================== */
        .orderbook-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            height: auto;
            /* Убираем height:100%, чтобы не растягивался */
        }

        .orderbook-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .orderbook-select {
            background: #111;
            color: white;
            border: 1px solid var(--border);
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 700;
            outline: none;
        }

        .orderbook-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .orderbook-box {
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 18px;
            padding: 14px;
        }

        .orderbook-subtitle {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            font-size: 14px;
        }

        /* ================================================== SECTIONS ================================================== */
        .section {
            margin-top: 55px;
        }

        /* ================================================== TRADES inside orderbook ================================================== */
        .trades-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 18px;
            padding: 16px;
        }

        .trades-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trades-title {
            font-size: 18px;
            font-weight: 700;
        }

        .trades-source {
            font-size: 12px;
            color: var(--orange);
            font-weight: 600;
            background: rgba(255, 140, 0, .12);
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .trades-source .dot-live {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1s infinite;
        }

        .trade-feed {
            max-height: 220px;
            /* Немного уменьшил высоту для компактности */
            overflow: auto;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
        }

        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            font-size: 13px;
            background: rgba(255, 255, 255, .01);
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .trade-item:last-child {
            border-bottom: none;
        }

        /* ================================================== NEWS ================================================== */
        .news-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .refresh-btn {
            border: none;
            background: linear-gradient(90deg, var(--orange), var(--orange2));
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
            transition: .25s;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 140, 0, .45);
        }

        .news-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .news-content {
            padding: 18px;
        }

        .news-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .news-date {
            color: var(--gray);
            margin-bottom: 16px;
        }

        .news-link {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, var(--orange), var(--orange2));
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* ================================================== FOOTER ================================================== */
        .footer {
            margin-top: 60px;
            text-align: center;
            color: var(--gray);
        }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="ticker" id="ticker">
            <div class="ticker-item"> Loading... </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo"> CryptoVision </div>
            <div class="header-right">
                <div class="live-box">
                    <div class="dot"></div>
                    <span>Binance LIVE</span>
                </div>
                <button class="theme-btn" id="themeBtn"> ☀ Theme </button>
            </div>
        </header>

        <!-- TOP GRID: MAIN COINS + ORDER BOOK (всегда рядом) -->
        <div class="top-grid">
            <section>
                <h2 class="section-title"> Main Coins </h2>
                <div class="crypto-grid" id="mainCoins"></div>
            </section>

            <section>
                <div class="orderbook-panel">
                    <div class="orderbook-top">
                        <h2 class="section-title"> Order Book </h2>
                        <select id="orderbookSelect" class="orderbook-select">
                            <option value="btcusdt"> BTCUSDT </option>
                            <option value="ethusdt"> ETHUSDT </option>
                            <option value="solusdt"> SOLUSDT </option>
                            <option value="bnbusdt"> BNBUSDT </option>
                            <option value="xrpusdt"> XRPUSDT </option>
                            <option value="adausdt"> ADAUSDT </option>
                        </select>
                    </div>
                    <div class="orderbook-grid">
                        <div class="orderbook-box">
                            <div class="orderbook-subtitle"> Bids </div>
                            <div id="bids"></div>
                        </div>
                        <div class="orderbook-box">
                            <div class="orderbook-subtitle"> Asks </div>
                            <div id="asks"></div>
                        </div>
                    </div>
                    <!-- LIVE TRADES SECTION INSIDE ORDER BOOK PANEL -->
                    <div class="trades-box">
                        <div class="trades-header">
                            <div class="trades-title"> Live Trades </div>
                            <div class="trades-source">
                                <span class="dot-live"></span> Binance WebSocket
                            </div>
                        </div>
                        <div class="trade-feed" id="tradeFeed"></div>
                    </div>
                </div>
            </section>
        </div>

        <!-- ADDITIONAL COINS -->
        <section class="section">
            <h2 class="section-title"> Additional Coins </h2>
            <div class="crypto-grid" id="extraCoins"></div>
        </section>

        <!-- NEWS -->
        <section class="section">
            <div class="news-top">
                <h2 class="section-title"> CoinTelegraph News </h2>
                <button class="refresh-btn" id="refreshNewsBtn"> 🔥 Refresh News </button>
            </div>
            <div id="newsUpdateTime" style="margin-bottom:20px;color:var(--gray);"> Last update: — </div>
            <div class="news-grid" id="newsContainer"></div>
        </section>
    </div>

    <footer class="footer">
        CryptoVision • Binance WebSocket • CoinGecko
    </footer>

    <script>
        /* ================================================== CONFIG ================================================== */
        const mainCoins = [
            'bitcoin', 'ethereum', 'solana', 'ripple'
        ];
        const extraCoins = [
            'binancecoin', 'dogecoin', 'cardano', 'avalanche-2', 'chainlink', 'tron'
        ];
        const symbolMap = {
            bitcoin: 'btcusdt',
            ethereum: 'ethusdt',
            solana: 'solusdt',
            ripple: 'xrpusdt',
            binancecoin: 'bnbusdt',
            dogecoin: 'dogeusdt',
            cardano: 'adausdt',
            'avalanche-2': 'avaxusdt',
            chainlink: 'linkusdt',
            tron: 'trxusdt'
        };
        const charts = {};
        let orderbookSocket = null;

        /* ================================================== THEME ================================================== */
        document
            .getElementById('themeBtn')
            .addEventListener('click', () => {
                document.body.classList.toggle('light');
            });

        /* ================================================== LOAD COINS ================================================== */
        async function loadCoins() {
            const allCoins = [
                ...mainCoins,
                ...extraCoins
            ];
            const url =
                `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${allCoins.join(',')}&sparkline=true&price_change_percentage=24h`;
            const response = await fetch(url);
            const data = await response.json();
            renderCoins(
                data.filter(c => mainCoins.includes(c.id)),
                'mainCoins'
            );
            renderCoins(
                data.filter(c => extraCoins.includes(c.id)),
                'extraCoins'
            );
            buildTicker(data);
        }

        /* ================================================== RENDER COINS ================================================== */
        function renderCoins(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.forEach(coin => {
                const positive = coin.price_change_percentage_24h >= 0;
                const chartId = `chart-${coin.id}`;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
        <div class="coin-header">
          <div class="coin-info">
            <img src="${coin.image}" alt="${coin.name}" >
            <div>
              <div class="coin-name"> ${coin.name} </div>
              <div class="coin-symbol"> ${coin.symbol.toUpperCase()} </div>
            </div>
          </div>
        </div>
        <div class="price" id="price-${coin.id}" > $${coin.current_price.toLocaleString()} </div>
        <div class="binance-price" id="binance-${coin.id}" > Binance: <span> loading... </span> </div>
        <div class="change ${positive ? 'positive' : 'negative'}"> ${positive ? '▲' : '▼'} ${coin.price_change_percentage_24h.toFixed(2)}% </div>
        <div class="chart-wrap">
          <canvas id="${chartId}"></canvas>
        </div>
        <div class="history-box">
          <div class="history-item">
            <div class="history-label"> HIGH 24H </div>
            <div class="history-value"> $${coin.high_24h.toLocaleString()} </div>
          </div>
          <div class="history-item">
            <div class="history-label"> LOW 24H </div>
            <div class="history-value"> $${coin.low_24h.toLocaleString()} </div>
          </div>
          <div class="history-item">
            <div class="history-label"> MARKET CAP </div>
            <div class="history-value"> $${formatNumber(coin.market_cap)} </div>
          </div>
        </div>
        `;
                container.appendChild(card);
                createChart(
                    chartId,
                    coin.sparkline_in_7d.price,
                    positive
                );
            });
        }

        /* ================================================== CHARTS ================================================== */
        function createChart(id, prices, positive) {
            const ctx = document.getElementById(id);
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(() => ''),
                    datasets: [{
                        data: prices,
                        borderColor: positive ? '#00d26a' : '#ff4747',
                        backgroundColor: positive ? 'rgba(0,210,106,.12)' : 'rgba(255,71,71,.12)',
                        fill: true,
                        tension: .35,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            display: false
                        },
                        y: {
                            display: false
                        }
                    }
                }
            });
        }

        /* ================================================== BINANCE LIVE ================================================== */
        function connectTradeSocket() {
            const streams = Object.values(symbolMap)
                .map(s => `${s}@trade`)
                .join('/');
            const ws = new WebSocket(
                `wss://stream.binance.com:9443/stream?streams=${streams}`
            );
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                const data = message.data;
                const symbol = data.s.toLowerCase();
                const price = parseFloat(data.p);
                const quantity = parseFloat(data.q);
                Object.keys(symbolMap)
                    .forEach(id => {
                        if (symbolMap[id] === symbol) {
                            updateBinancePrice(
                                id,
                                price
                            );
                            updateChart(
                                id,
                                price
                            );
                            updateTicker(
                                id,
                                price
                            );
                            if (id === 'bitcoin') {
                                addTrade(
                                    price,
                                    quantity,
                                    data.m
                                );
                            }
                        }
                    });
            };
            ws.onclose = () => {
                setTimeout(
                    connectTradeSocket,
                    3000
                );
            };
        }

        /* ================================================== UPDATE LIVE PRICE ================================================== */
        function updateBinancePrice(id, price) {
            const element = document.getElementById(
                `binance-${id}`
            );
            if (!element) return;
            element.innerHTML = ` Binance: <span> $${price.toLocaleString( undefined, { maximumFractionDigits:2 } )} </span> `;
        }

        /* ================================================== UPDATE CHART ================================================== */
        function updateChart(id, price) {
            const chart = charts[`chart-${id}`];
            if (!chart) return;
            const dataset = chart.data.datasets[0].data;
            dataset.push(price);
            if (dataset.length > 60) {
                dataset.shift();
            }
            chart.update('none');
        }

        /* ================================================== ORDER BOOK ================================================== */
        function connectOrderBook(symbol) {
            if (orderbookSocket) {
                orderbookSocket.close();
            }
            orderbookSocket = new WebSocket(
                `wss://stream.binance.com:9443/ws/${symbol}@depth20@100ms`
            );
            orderbookSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                renderOrders(
                    data.bids,
                    'bids',
                    true
                );
                renderOrders(
                    data.asks,
                    'asks',
                    false
                );
            };
        }

        function renderOrders(data, containerId, bids) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.slice(0, 10).forEach(order => {
                const row = document.createElement('div');
                row.className = 'order-row';
                row.innerHTML = `
        <span class="${ bids ? 'positive' : 'negative' }"> ${parseFloat(order[0]).toLocaleString()} </span>
        <span> ${parseFloat(order[1]).toFixed(4)} </span>
        `;
                container.appendChild(row);
            });
        }
        document
            .getElementById('orderbookSelect')
            .addEventListener('change', (e) => {
                connectOrderBook(
                    e.target.value
                );
            });

        /* ================================================== TRADES ================================================== */
        function addTrade(price, qty, seller) {
            const feed = document.getElementById(
                'tradeFeed'
            );
            const item = document.createElement('div');
            item.className = 'trade-item';
            item.innerHTML = `
        <span class="${ seller ? 'negative' : 'positive' }"> ${ seller ? 'SELL' : 'BUY' } </span>
        <span> BTC </span>
        <span> ${qty.toFixed(4)} </span>
        <span> $${price.toLocaleString()} </span>
        `;
            feed.prepend(item);
            while (feed.children.length > 50) {
                feed.removeChild(
                    feed.lastChild
                );
            }
        }

        /* ================================================== TICKER ================================================== */
        function buildTicker(data) {
            const ticker = document.getElementById(
                'ticker'
            );
            ticker.innerHTML = '';
            [...data, ...data].forEach(coin => {
                const positive = coin.price_change_percentage_24h >= 0;
                const item = document.createElement('div');
                item.className = 'ticker-item';
                item.id = `ticker-${coin.id}`;
                item.innerHTML = `
        <span> ${coin.symbol.toUpperCase()} </span>
        <span> $${coin.current_price.toLocaleString()} </span>
        <span class="${ positive ? 'positive' : 'negative' }"> ${ positive ? '▲' : '▼' } ${coin.price_change_percentage_24h.toFixed(2)}% </span>
        `;
                ticker.appendChild(item);
            });
        }

        function updateTicker(id, price) {
            const el = document.getElementById(
                `ticker-${id}`
            );
            if (!el) return;
            el.children[1].textContent = '$' + price.toLocaleString(
                undefined, {
                    maximumFractionDigits: 2
                }
            );
        }

        /* ================================================== NEWS ================================================== */
        async function loadNews() {
            const rss = encodeURIComponent(
                'https://cointelegraph.com/rss'
            );
            const url =
                `https://api.rss2json.com/v1/api.json?rss_url=${rss}`;
            const response = await fetch(url);
            const data = await response.json();
            renderNews(
                data.items.slice(0, 6)
            );
            updateNewsTime();
        }

        function renderNews(news) {
            const container = document.getElementById(
                'newsContainer'
            );
            container.innerHTML = '';
            news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
        <img src="${item.thumbnail || ''}" alt="news" >
        <div class="news-content">
          <div class="news-title"> ${item.title} </div>
          <div class="news-date"> ${new Date( item.pubDate ).toLocaleString()} </div>
          <a class="news-link" href="${safeURL(item.link)}" target="_blank" rel="noopener noreferrer" > Read Article </a>
        </div>
        `;
                container.appendChild(card);
            });
        }
        document
            .getElementById(
                'refreshNewsBtn'
            )
            .addEventListener('click', async () => {
                const btn = document.getElementById(
                    'refreshNewsBtn'
                );
                btn.disabled = true;
                btn.textContent = 'Refreshing...';
                await loadNews();
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '🔥 Refresh News';
                }, 1000);
            });

        function updateNewsTime() {
            document
                .getElementById(
                    'newsUpdateTime'
                ).textContent = 'Last update: ' + new Date().toLocaleString();
        }

        /* ================================================== UTILS ================================================== */
        function formatNumber(num) {
            if (num >= 1e12) {
                return (num / 1e12).toFixed(2) + 'T';
            }
            if (num >= 1e9) {
                return (num / 1e9).toFixed(2) + 'B';
            }
            if (num >= 1e6) {
                return (num / 1e6).toFixed(2) + 'M';
            }
            return num;
        }

        function safeURL(url) {
            try {
                const parsed = new URL(url);
                if (
                    parsed.protocol === 'https:' ||
                    parsed.protocol === 'http:'
                ) {
                    return parsed.href;
                }
                return '#';
            } catch {
                return '#';
            }
        }

        /* ================================================== INIT ================================================== */
        loadCoins();
        loadNews();
        connectTradeSocket();
        connectOrderBook('btcusdt');

        /* REAL PRICE REFRESH */
        setInterval(
            loadCoins,
            30000
        );

        /* NEWS AUTO UPDATE */
        setInterval(
            loadNews,
            3600000
        );
    </script>
</body>
</html>
